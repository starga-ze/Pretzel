[server]
protocol = https
http_addr = 0.0.0.0
http_port = 3000
domain = localhost
cert_file = /etc/nf-nms/cert/server.crt
cert_key = /etc/nf-nms/cert/server.key

[security]
admin_user = admin
admin_password = admin

[auth]
disable_login_form = false

[auth.anonymous]
enabled = true
org_name = Main Org.
org_role = Viewer
hide_version = true

[users]
allow_sign_up = false
auto_assign_org = true
auto_assign_org_role = Viewer
