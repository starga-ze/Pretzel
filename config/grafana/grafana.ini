[server]
protocol = http
http_addr = 0.0.0.0
http_port = 3000
domain = localhost
# cert_file = /etc/pretzel/cert/server.crt
# cert_key = /etc/pretzel/cert/server.key

[security]
admin_user = admin
# Read from the environment so the password is not committed. pz-grafana.service sets
# GF_SECURITY_ADMIN_PASSWORD (default "admin" for localhost dev); override it there
# or in a drop-in for production.
admin_password = $__env{GF_SECURITY_ADMIN_PASSWORD}
allow_embedding = true

[auth]
disable_login_form = false

[auth.anonymous]
enabled = true
org_name = Main Org.
org_role = Viewer
hide_version = true

[users]
allow_sign_up = false
auto_assign_org = true
auto_assign_org_role = Viewer
viewers_can_edit = false

[explore]
enabled = false

[alerting]
enabled = false

[unified_alerting]
enabled = false

[help]
enabled = false
