<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pretzel NMS — Insight</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
<div class="app-shell" id="appShell">
  <aside class="sidebar" id="sidebar"><!-- populated by main.js --></aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="rail-toggle" id="railToggle">
    <button class="rail-toggle-btn" id="railToggleBtn" aria-label="Open sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6"  x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="content-wrap">
    <main class="content-body">
      <div class="coming-soon-wrap">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity=".25">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <h2 class="coming-soon-title">Insight</h2>
        <p class="coming-soon-sub">This feature is coming soon.</p>
      </div>
    </main>
  </div>
</div>
<script src="js/main.js"></script>
</body>
</html>
