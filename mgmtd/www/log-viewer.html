<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pretzel NMS — Log Viewer</title>
  <link rel="stylesheet" href="css/main.css" />
  <script>try{if(localStorage.getItem('sidebarCollapsed')==='true')document.documentElement.classList.add('sb-init-collapsed')}catch(e){}</script>
</head>
<body>
<div class="app-shell" id="appShell">

  <aside class="sidebar" id="sidebar"><!-- populated by main.js --></aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="rail-toggle" id="railToggle">
    <button class="rail-toggle-btn" id="railToggleBtn" aria-label="Open sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="content-wrap">
    <main class="content-body lv-page">

      <!-- ── Top toolbar ── -->
      <div class="lv-topbar">
        <div class="lv-topbar-left">
          <h1 class="lv-title">Log Viewer</h1>
          <span class="lv-stats" id="lv-stats">
            <span id="lv-count-total">—</span> lines
            <span class="lv-stats-sep">·</span>
            <span id="lv-count-filtered">—</span> shown
          </span>
        </div>
        <div class="lv-topbar-right">

          <!-- Service custom dropdown -->
          <div class="lv-dd-wrap" id="serviceDropWrap">
            <button class="lv-dd-btn" id="serviceDropBtn" type="button">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0">
                <rect x="2" y="3" width="20" height="14" rx="2"/>
                <line x1="8" y1="21" x2="16" y2="21"/>
                <line x1="12" y1="17" x2="12" y2="21"/>
              </svg>
              <span class="lv-dd-label" id="serviceDropLabel">All Services</span>
              <svg class="lv-dd-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <ul class="lv-dd-list" id="serviceDropList">
              <li class="lv-dd-item lv-dd-selected" data-value="">All Services</li>
              <li class="lv-dd-item" data-value="engined">engined</li>
              <li class="lv-dd-item" data-value="authd">authd</li>
              <li class="lv-dd-item" data-value="icmpd">icmpd</li>
              <li class="lv-dd-item" data-value="scand">scand</li>
              <li class="lv-dd-item" data-value="topologyd">topologyd</li>
            </ul>
          </div>

          <!-- Level custom dropdown -->
          <div class="lv-dd-wrap" id="levelDropWrap">
            <button class="lv-dd-btn" id="levelDropBtn" type="button">
              <span class="lv-level-dot" id="lvLevelDot"></span>
              <span class="lv-dd-label" id="levelDropLabel">All Levels</span>
              <svg class="lv-dd-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <ul class="lv-dd-list" id="levelDropList">
              <li class="lv-dd-item lv-dd-selected" data-value="">All Levels</li>
              <li class="lv-dd-item" data-value="INFO">
                <span class="lv-dd-dot" style="background:#22c55e"></span>INFO
              </li>
              <li class="lv-dd-item" data-value="DEBUG">
                <span class="lv-dd-dot" style="background:#3b82f6"></span>DEBUG
              </li>
              <li class="lv-dd-item" data-value="WARN">
                <span class="lv-dd-dot" style="background:#f59e0b"></span>WARN
              </li>
              <li class="lv-dd-item" data-value="ERROR">
                <span class="lv-dd-dot" style="background:#ef4444"></span>ERROR
              </li>
            </ul>
          </div>

          <!-- Date/time range filter (disabled — future feature) -->
          <div class="lv-date-wrap lv-date-disabled" id="lvDateWrap">
            <button class="lv-date-btn" id="lvDateBtn" disabled>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8"  y1="2" x2="8"  y2="6"/>
                <line x1="3"  y1="10" x2="21" y2="10"/>
              </svg>
              <span class="lv-date-label" id="lvDateLabel">Date Range</span>
              <svg class="lv-date-chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </button>

            <!-- Range picker dropdown -->
            <div class="lv-cal-dropdown lv-range-dropdown" id="lvCalDropdown">

              <!-- Two calendars side by side: Start | End -->
              <div class="lv-range-header">
                <span class="lv-range-label">Start</span>
                <span class="lv-range-label">End</span>
              </div>
              <div class="lv-range-panels">

                <!-- Start calendar -->
                <div class="lv-range-panel">
                  <div class="lv-cal-header">
                    <button class="lv-cal-nav" id="lvCalPrevStart">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                    <span class="lv-cal-month" id="lvCalMonthStart"></span>
                    <button class="lv-cal-nav" id="lvCalNextStart">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                  </div>
                  <div class="lv-cal-weekdays">
                    <span>Su</span><span>Mo</span><span>Tu</span><span>We</span>
                    <span>Th</span><span>Fr</span><span>Sa</span>
                  </div>
                  <div class="lv-cal-days" id="lvCalDaysStart"></div>
                  <div class="lv-cal-time">
                    <div class="lv-cal-time-group">
                      <label>Hour</label>
                      <select id="lvStartHour" class="lv-cal-time-sel"><option value="">Any</option></select>
                    </div>
                    <div class="lv-cal-time-group">
                      <label>Minute</label>
                      <select id="lvStartMinute" class="lv-cal-time-sel"><option value="">Any</option></select>
                    </div>
                  </div>
                </div>

                <div class="lv-range-sep">→</div>

                <!-- End calendar -->
                <div class="lv-range-panel">
                  <div class="lv-cal-header">
                    <button class="lv-cal-nav" id="lvCalPrevEnd">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                    <span class="lv-cal-month" id="lvCalMonthEnd"></span>
                    <button class="lv-cal-nav" id="lvCalNextEnd">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                  </div>
                  <div class="lv-cal-weekdays">
                    <span>Su</span><span>Mo</span><span>Tu</span><span>We</span>
                    <span>Th</span><span>Fr</span><span>Sa</span>
                  </div>
                  <div class="lv-cal-days" id="lvCalDaysEnd"></div>
                  <div class="lv-cal-time">
                    <div class="lv-cal-time-group">
                      <label>Hour</label>
                      <select id="lvEndHour" class="lv-cal-time-sel"><option value="">Any</option></select>
                    </div>
                    <div class="lv-cal-time-group">
                      <label>Minute</label>
                      <select id="lvEndMinute" class="lv-cal-time-sel"><option value="">Any</option></select>
                    </div>
                  </div>
                </div>

              </div><!-- /lv-range-panels -->

              <div class="lv-cal-footer">
                <button class="lv-cal-clear" id="lvCalClear">Clear</button>
                <button class="lv-cal-apply btn btn-primary" id="lvCalApply">Apply</button>
              </div>
            </div>
          </div>

          <div class="lv-divider"></div>

          <!-- Search -->
          <div class="lv-search-wrap">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="logSearch" class="lv-search" placeholder="Search logs…" />
          </div>

          <div class="lv-divider"></div>

          <!-- Refresh -->
          <button class="btn btn-ghost btn-icon-only lv-refresh-btn" id="refreshBtn" title="Refresh">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- ── Log table + pagination wrapper ── -->
      <div class="lv-table-outer">

        <div class="lv-table-wrap">
          <div class="lv-loading-overlay" id="lvLoadingOverlay">
            <div class="lv-loading-inner">
              <svg class="lv-spinner" width="32" height="32" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
              </svg>
              <span class="lv-loading-label" id="lvLoadingLabel">Loading…</span>
            </div>
          </div>
          <table class="lv-table">
            <colgroup>
              <col class="lv-col-lv" />
              <col class="lv-col-daemon" />
              <col class="lv-col-time" />
              <col class="lv-col-loc" />
              <col class="lv-col-msg" />
            </colgroup>
            <thead>
              <tr>
                <th>Level</th>
                <th>Service</th>
                <th>Timestamp</th>
                <th>Location</th>
                <th>Message</th>
              </tr>
            </thead>
            <tbody id="logTbody">
              <tr><td colspan="5" class="lv-placeholder">Loading logs…</td></tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="lv-pagination" id="lvPagination"></div>

      </div>

    </main>
  </div>
</div>
<script src="js/main.js"></script>
<script src="js/log-viewer.js"></script>
</body>
</html>
