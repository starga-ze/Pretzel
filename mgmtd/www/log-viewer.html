<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pretzel NMS — Log Viewer</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
<div class="app-shell" id="appShell">

  <aside class="sidebar" id="sidebar"><!-- populated by main.js --></aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="rail-toggle" id="railToggle">
    <button class="rail-toggle-btn" id="railToggleBtn" aria-label="Open sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="content-wrap">
    <main class="content-body lv-page">

      <!-- ── Top toolbar ── -->
      <div class="lv-topbar">
        <div class="lv-topbar-left">
          <h1 class="lv-title">Log Viewer</h1>
        </div>
        <div class="lv-topbar-right">
          <!-- Lines selector -->
          <div class="lv-select-wrap">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
              <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
              <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            <select id="logLines" class="lv-select">
              <option value="100">Last 100 lines</option>
              <option value="200" selected>Last 200 lines</option>
              <option value="500">Last 500 lines</option>
              <option value="1000">Last 1000 lines</option>
            </select>
            <svg class="select-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </div>

          <!-- Daemon selector -->
          <div class="lv-select-wrap" id="daemonSelectWrap">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            <select id="daemonSelect" class="lv-select">
              <option value="">All Daemons</option>
              <option value="ipcd">ipcd</option>
              <option value="engined">engined</option>
              <option value="mgmtd">mgmtd</option>
              <option value="authd">authd</option>
              <option value="icmpd">icmpd</option>
              <option value="snmpd">snmpd</option>
              <option value="topologyd">topologyd</option>
            </select>
            <svg class="select-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </div>

          <div class="lv-divider"></div>

          <!-- Search -->
          <div class="lv-search-wrap">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="logSearch" class="lv-search" placeholder="Search logs…" />
          </div>

          <div class="lv-divider"></div>

          <!-- Auto-refresh toggle -->
          <label class="lv-auto-toggle" id="autoToggle" title="자동 갱신">
            <span class="lv-auto-dot" id="autoRefreshDot"></span>
            <input type="checkbox" id="autoRefresh" checked style="display:none" />
            <span id="autoRefreshLabel">Live</span>
          </label>

          <!-- Refresh -->
          <button class="lv-icon-btn" id="refreshBtn" title="Refresh">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
          </button>

          <!-- Clear -->
          <button class="lv-icon-btn" id="clearBtn" title="Clear">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>
              <path d="M9 6V4h6v2"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- ── Level filter bar ── -->
      <div class="lv-filterbar">
        <div class="lv-level-tabs" id="levelFilter">
          <button class="lv-level-tab active" data-level="">ALL</button>
          <button class="lv-level-tab lv-tab-crit"  data-level="CRIT">CRITICAL</button>
          <button class="lv-level-tab lv-tab-error" data-level="ERROR">ERROR</button>
          <button class="lv-level-tab lv-tab-warn"  data-level="WARN">WARN</button>
          <button class="lv-level-tab lv-tab-info"  data-level="INFO">INFO</button>
          <button class="lv-level-tab lv-tab-debug" data-level="DEBUG">DEBUG</button>
        </div>
        <div class="lv-stats" id="lv-stats">
          <span id="lv-count-total">—</span> lines
          <span class="lv-stats-sep">·</span>
          <span id="lv-count-filtered">—</span> shown
        </div>
      </div>

      <!-- ── Log table ── -->
      <div class="lv-table-wrap">
        <table class="lv-table">
          <colgroup>
            <col class="lv-col-lv" />
            <col class="lv-col-time" />
            <col class="lv-col-daemon" />
            <col class="lv-col-msg" />
          </colgroup>
          <thead>
            <tr>
              <th>Level</th>
              <th>Timestamp</th>
              <th>Daemon</th>
              <th>Message</th>
            </tr>
          </thead>
          <tbody id="logTbody">
            <tr><td colspan="4" class="lv-placeholder">로그 로드 중…</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>
</div>
<script src="js/main.js"></script>
<script src="js/log-viewer.js"></script>
</body>
</html>
