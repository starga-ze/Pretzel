<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pretzel NMS — Rack View</title>
  <link rel="stylesheet" href="css/main.css" />
  <script>try{if(localStorage.getItem('sidebarCollapsed')==='true')document.documentElement.classList.add('sb-init-collapsed')}catch(e){}</script>
</head>
<body>
<div class="app-shell" id="appShell">
  <aside class="sidebar" id="sidebar"><!-- populated by main.js --></aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="rail-toggle" id="railToggle">
    <button class="rail-toggle-btn" id="railToggleBtn" aria-label="Open sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6"  x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="content-wrap">
    <main class="content-body">
      <div class="page-header">
        <div>
          <h1 class="page-title">Rack View</h1>
          <p class="page-subtitle">Read-only rack layout — green = matched in probe, red = not found. Edit racks &amp; allocate devices in Configuration ▸ Rack List.</p>
        </div>
        <button class="btn btn-ghost btn-icon-only" id="refreshBtn" title="Refresh">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>

      <div id="rackMgmt">
        <div class="section-card"><div class="loading-row">Loading…</div></div>
      </div>
    </main>
  </div>
</div>

<script src="js/main.js"></script>
<script src="js/rack-management.js"></script>
</body>
</html>
