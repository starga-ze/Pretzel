<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pretzel</title>
  <link rel="stylesheet" href="css/main.css" />
  <script>try{if(localStorage.getItem('sidebarCollapsed')==='true')document.documentElement.classList.add('sb-init-collapsed')}catch(e){}</script>
</head>
<body>
<div class="app-shell" id="appShell">

  <aside class="sidebar" id="sidebar"><!-- populated by main.js --></aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="rail-toggle" id="railToggle">
    <button class="rail-toggle-btn" id="railToggleBtn" aria-label="Open sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="content-wrap">
    <header class="page-topbar" id="pageTopbar"><!-- populated by main.js --></header>
    <main class="content-body" id="contentBody">

      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-label">Sites</div>
          <div class="stat-value" id="statSites">&mdash;</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Racks</div>
          <div class="stat-value" id="statRacks">&mdash;</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Devices</div>
          <div class="stat-value" id="statDevices">&mdash;</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Reachable</div>
          <div class="stat-value" id="statOnline">&mdash;</div>
          <div class="stat-sub"><span class="dot dot-red"></span><span id="statOffline">&mdash;</span> unreachable</div>
        </div>
      </div>

      <div class="section-card">
        <div class="section-header">
          <span class="section-title">Rack Status</span>
          <span class="section-hint">Device health per rack</span>
        </div>
        <div class="rack-grid" id="rackGrid">
          <div class="home-empty">No racks configured yet &mdash; add a site and racks in <b>Configuration</b>.</div>
        </div>
      </div>

    </main>
  </div>

</div>
<script src="js/main.js"></script>
</body>
</html>
