<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pretzel NMS — Dashboard</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
<div class="app-shell" id="appShell">

  <aside class="sidebar" id="sidebar"><!-- populated by main.js --></aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="rail-toggle" id="railToggle">
    <button class="rail-toggle-btn" id="railToggleBtn" aria-label="Open sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="content-wrap">
    <main class="content-body">

      <div class="page-header">
        <div>
          <h1 class="page-title">Dashboard</h1>
          <p class="page-subtitle">System health and service status monitoring</p>
        </div>
        <button class="btn btn-ghost btn-icon-only" id="refreshBtn" title="Refresh">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>

      <!-- System metrics (node exporter) -->
      <div class="metric-cards" id="metricCards">
        <div class="metric-card">
          <div class="metric-card-label">CPU</div>
          <div class="metric-card-value" id="cpuVal">--</div>
          <div class="metric-bar"><div class="metric-bar-fill" id="cpuBar" style="width:0%"></div></div>
        </div>
        <div class="metric-card">
          <div class="metric-card-label">Memory</div>
          <div class="metric-card-value" id="memVal">--</div>
          <div class="metric-bar"><div class="metric-bar-fill" id="memBar" style="width:0%"></div></div>
        </div>
        <div class="metric-card">
          <div class="metric-card-label">Disk (/)</div>
          <div class="metric-card-value" id="diskVal">--</div>
          <div class="metric-bar"><div class="metric-bar-fill" id="diskBar" style="width:0%"></div></div>
        </div>
        <div class="metric-card">
          <div class="metric-card-label">Alive Devices</div>
          <div class="metric-card-value" id="aliveVal">--</div>
          <div class="metric-card-sub">ICMP Scan Results</div>
        </div>
      </div>

      <!-- Daemon Health -->
      <div class="section-card">
        <div class="section-header">
          <span class="section-title">Daemon Health</span>
          <span class="hb-timestamp" id="hbTimestamp"></span>
        </div>
        <div class="daemon-grid" id="daemonGrid">
          <div class="loading-row">Waiting for health data…</div>
        </div>
      </div>

    </main>
  </div>
</div>
<script src="js/main.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
