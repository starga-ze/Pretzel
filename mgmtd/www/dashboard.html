<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pretzel NMS — Dashboard</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

<div class="app-shell" id="appShell">

  <!-- ══ Sidebar ══ -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-brand">
      <div class="brand-icon">P</div>
      <span class="brand-name">Pretzel</span>
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Collapse sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
          <polyline points="15 9 12 12 15 15"/>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>

      <a class="nav-item active" data-page="dashboard.html" data-tooltip="Dashboard" href="dashboard.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span class="nav-label">Dashboard</span>
      </a>

      <a class="nav-item" data-page="metrics.html" data-tooltip="Metrics" href="#">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <span class="nav-label">Metrics</span>
      </a>

      <a class="nav-item" data-page="devices.html" data-tooltip="Devices" href="#">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <rect x="2" y="2" width="20" height="8" rx="2"/>
          <rect x="2" y="14" width="20" height="8" rx="2"/>
          <line x1="6" y1="6" x2="6.01" y2="6"/>
          <line x1="6" y1="18" x2="6.01" y2="18"/>
        </svg>
        <span class="nav-label">Devices</span>
        <span class="nav-badge" id="aliveCount">--</span>
      </a>

      <div class="nav-section-label">Monitoring</div>

      <a class="nav-item" data-page="prometheus.html" data-tooltip="Prometheus" href="#">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6"  y1="20" x2="6"  y2="14"/>
        </svg>
        <span class="nav-label">Prometheus</span>
      </a>

      <a class="nav-item" data-page="node-exporter.html" data-tooltip="Node Exporter" href="#">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
          <rect x="9" y="9" width="6" height="6"/>
          <line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/>
          <line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/>
          <line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="15" x2="23" y2="15"/>
          <line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="15" x2="4" y2="15"/>
        </svg>
        <span class="nav-label">Node Exporter</span>
      </a>

      <a class="nav-item" data-page="events.html" data-tooltip="Events" href="#">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="nav-label">Events</span>
      </a>

      <div class="nav-section-label">System</div>

      <a class="nav-item" data-page="settings.html" data-tooltip="Settings" href="#">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                   a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                   A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                   l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                   A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                   l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                   a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                   l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                   a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span class="nav-label">Settings</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="nav-item" data-tooltip="v0.1.0-dev"
           style="cursor:default;opacity:.35;pointer-events:none;">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span class="nav-label">v0.1.0-dev</span>
      </div>
    </div>
  </aside>

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Rail toggle -->
  <div class="rail-toggle" id="railToggle">
    <button class="rail-toggle-btn" id="railToggleBtn" aria-label="Open sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Floating action buttons -->
  <div class="floating-actions">
    <button class="btn btn-glass" id="refreshBtn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Refresh
    </button>
    <button class="btn btn-primary" id="exportBtn">Export</button>
  </div>

  <!-- ══ Content ══ -->
  <div class="content-wrap">
    <main class="content-body">

      <!-- Status cards -->
      <div class="cards-grid">
        <div class="card">
          <div class="card-label">Uptime</div>
          <div class="card-value muted" id="uptimeVal">--</div>
          <div class="card-sub">seconds since boot</div>
        </div>

        <div class="card">
          <div class="card-label">Alive Devices</div>
          <div class="card-value muted" id="aliveVal">--</div>
          <div class="card-sub">ICMP discovery</div>
        </div>
      </div>

      <!-- Daemon Health (heartbeat) -->
      <div class="section-card">
        <div class="section-header">
          <span class="section-title">Daemon Health</span>
          <span class="hb-timestamp" id="hbTimestamp"></span>
        </div>
        <div class="daemon-grid" id="daemonGrid">
          <div class="loading-row">Waiting for heartbeat data…</div>
        </div>
      </div>

      <!-- Event Viewer -->
      <div class="section-card">
        <div class="section-header">
          <span class="section-title">Event Viewer</span>
        </div>
        <div class="event-list" id="eventList">
          <div class="loading-row">Loading…</div>
        </div>
      </div>

    </main>
  </div>
</div><!-- /app-shell -->

<script src="js/main.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
