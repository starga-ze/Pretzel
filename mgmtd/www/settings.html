<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pretzel</title>
  <link rel="stylesheet" href="css/main.css" />
  <script>try{if(localStorage.getItem('sidebarCollapsed')==='true')document.documentElement.classList.add('sb-init-collapsed')}catch(e){}</script>
</head>
<body>
<div class="app-shell" id="appShell">

  <aside class="sidebar" id="sidebar"><!-- populated by main.js --></aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="rail-toggle" id="railToggle">
    <button class="rail-toggle-btn" id="railToggleBtn" aria-label="Open sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="content-wrap">
    <header class="page-topbar" id="pageTopbar"><!-- populated by main.js --></header>
    <main class="content-body" id="contentBody"></main>
  </div>

</div>
<script src="js/main.js"></script>
<!-- Configuration is one page with two levels of tabs (see PAGES.settings in main.js). Every tab
     module loads here: each renders into #contentBody only when its own tab is active, but keeps
     its data + staged state resident so cross-references (site names, profile labels, endpoint
     and object pickers) resolve from any tab and the Publish/Revert pending state spans all
     domains — commit.js owns that registry, so it loads first. users/operation are read-only
     tabs with no staging provider. Splitting these across pages would break the shared registry. -->
<script src="js/commit.js"></script>
<script src="js/sites.js"></script>
<script src="js/config.js"></script>
<script src="js/api-keys.js"></script>
<script src="js/endpoints.js"></script>
<script src="js/api-connectors.js"></script>
<script src="js/users.js"></script>
<script src="js/operation.js"></script>
</body>
</html>
