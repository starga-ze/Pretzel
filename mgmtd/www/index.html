<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pretzel NMS</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    /* ── Login page overrides ── */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
      font-family: var(--font-ui);
    }

    .login-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 400px;
      padding: 0 16px;
    }

    /* Logo mark */
    .login-logo {
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .login-logo-icon {
      width: 58px; height: 58px;
      background: linear-gradient(135deg, #f97316 0%, #fb923c 60%, #fbbf24 100%);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 800; color: #fff;
      box-shadow: 0 8px 28px rgba(249,115,22,.35);
    }

    .login-logo-name {
      font-size: 26px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.02em;
    }

    /* Card */
    .login-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
    }

    .login-field {
      margin-bottom: 16px;
    }

    .login-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .login-input {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: var(--font-ui);
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color .18s, box-shadow .18s;
    }
    .login-input::placeholder { color: #9ca3af; }
    .login-input:focus {
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249,115,22,.12);
    }

    /* Password wrapper for eye toggle */
    .pw-wrap { position: relative; }
    .pw-toggle {
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: #9ca3af;
      padding: 2px;
      display: flex; align-items: center;
      transition: color .15s;
    }
    .pw-toggle:hover { color: var(--text); }

    .login-btn {
      width: 100%;
      padding: 11px;
      background: #3b5bdb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      transition: background .18s, box-shadow .18s;
      letter-spacing: .01em;
    }
    .login-btn:hover {
      background: #364fc7;
      box-shadow: 0 4px 16px rgba(59,91,219,.3);
    }
    .login-btn:active { background: #2f44b0; }

    .login-error {
      display: none;
      margin-top: 12px;
      padding: 9px 12px;
      background: #fff1f0;
      border: 1px solid #fca5a5;
      border-radius: 7px;
      font-size: 12.5px;
      color: #dc2626;
    }
    .login-error.visible { display: block; }

    /* ── SSO (Okta) ── */
    .login-divider {
      display: flex;
      align-items: center;
      margin: 18px 0 14px;
      color: #9ca3af;
      font-size: 12px;
    }
    .login-divider::before,
    .login-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .login-divider span { padding: 0 12px; }

    .login-btn-sso {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 0;
    }
    .login-btn-sso:hover {
      background: var(--bg);
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }

    .login-footer {
      text-align: center;
      color: #9ca3af;
      font-size: 11.5px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="login-wrap">

    <!-- Logo -->
    <div class="login-logo">
      <div class="login-logo-icon">P</div>
      <span class="login-logo-name">Welcome to Pretzel</span>
    </div>

    <!-- Card -->
    <div class="login-card" id="loginCard">

      <div class="login-field">
        <label class="login-label" for="username">Email or username</label>
        <input class="login-input" type="text" id="username"
               placeholder="email or username" autocomplete="username" />
      </div>

      <div class="login-field">
        <label class="login-label" for="password">Password</label>
        <div class="pw-wrap">
          <input class="login-input" type="password" id="password"
                 placeholder="password" autocomplete="current-password"
                 style="padding-right: 38px;" />
          <button class="pw-toggle" id="pwToggle" tabindex="-1" type="button" aria-label="Show password">
            <!-- eye icon -->
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="login-btn" id="loginBtn">Log in</button>

      <div class="login-error" id="loginError">
        Invalid username or password
      </div>

      <!-- SSO (Okta) — revealed by login.js only when the server has it configured -->
      <div id="ssoSection" style="display:none;">
        <div class="login-divider"><span>or</span></div>
        <button class="login-btn login-btn-sso" id="ssoBtn" type="button">
          Sign in with Okta
        </button>
      </div>

    </div>

    <!-- Forced password-change card (shown after first login on the default password) -->
    <div class="login-card" id="changeCard" style="display:none;">

      <div class="login-field" style="margin-bottom:14px;">
        <span class="login-label" style="line-height:1.4;">
          You're signed in with the default password. Set a new password to continue.
        </span>
      </div>

      <div class="login-field">
        <label class="login-label" for="newPassword">New password</label>
        <input class="login-input" type="password" id="newPassword"
               placeholder="new password" autocomplete="new-password" />
      </div>

      <div class="login-field">
        <label class="login-label" for="confirmPassword">Confirm new password</label>
        <input class="login-input" type="password" id="confirmPassword"
               placeholder="confirm new password" autocomplete="new-password" />
      </div>

      <button class="login-btn" id="changeBtn">Set password &amp; continue</button>

      <div class="login-error" id="changeError">
        Passwords do not match
      </div>

    </div>

    <div class="login-footer">Pretzel NMS · © 2026</div>
  </div>

  <script src="js/login.js"></script>

</body>
</html>
