<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pretzel — Device Detail</title>
  <link rel="stylesheet" href="css/main.css" />
  <script>try{if(localStorage.getItem('sidebarCollapsed')==='true')document.documentElement.classList.add('sb-init-collapsed')}catch(e){}</script>
</head>
<body>
<div class="app-shell" id="appShell">
  <aside class="sidebar" id="sidebar"><!-- populated by main.js --></aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="rail-toggle" id="railToggle">
    <button class="rail-toggle-btn" id="railToggleBtn" aria-label="Open sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6"  x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="content-wrap">
    <main class="content-body">
      <div class="page-header">
        <div>
          <a class="back-link" href="devices">&larr; Devices</a>
          <h1 class="page-title" id="detailTitle">Device</h1>
          <p class="page-subtitle" id="detailSubtitle">Loading…</p>
        </div>
      </div>

      <div id="detailContent"></div>
    </main>
  </div>
</div>

<script src="js/main.js"></script>
<script src="js/device-detail.js"></script>
</body>
</html>
